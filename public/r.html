<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trap Wars</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #fff; font-family: monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { text-align: center; padding: 32px 24px; }
    h1 { color: #4ade80; font-size: 1.6rem; margin-bottom: 24px; }
    .btn { display: block; width: 100%; padding: 18px; background: #7c3aed; color: #fff; font-family: monospace; font-size: 1.2rem; letter-spacing: 2px; border: none; border-radius: 10px; cursor: pointer; text-decoration: none; }
    p { color: #4ade80; margin-bottom: 20px; font-size: 0.95rem; }
  </style>
</head>
<body>
<div class="box">
  <h1>⚔️ TRAP WARS</h1>
  <p id="msg">Clearing local state...</p>
  <a class="btn" href="https://trapwars.win/">ENTER →</a>
</div>
<script>
try {
  localStorage.removeItem('trapwars_battle_v2');
  localStorage.removeItem('trapwars_pending_join');
  sessionStorage.removeItem('trapwars_pending_join');
  document.getElementById('msg').textContent = '✅ All clear. Fresh start.';
} catch(e) {}
</script>
</body>
</html>
